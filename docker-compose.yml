# Full dev stack. `docker compose up --build` from the repo root brings up:
#   - Neo4j 5 (community)                  :7474 (browser) / :7687 (bolt)
#   - asp-api                              :8000
#   - frontend (Next.js dev server)        :3000
#   - OPA                                  :8181
#   - OpenTelemetry Collector              :4317 (gRPC) / :4318 (HTTP)
#
# Everything is wired to a shared network; the api reads service hostnames
# from .env (copied from .env.example the first time you run).

name: agentic-security-platform

services:
  neo4j:
    image: neo4j:5-community
    container_name: asp-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-changeme}"
      # APOC enables attack-path queries we'll use later.
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: asp-otel-collector
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "13133:13133"  # health_check

  opa:
    image: openpolicyagent/opa:latest
    container_name: asp-opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    ports:
      - "8181:8181"

  asp-api:
    build:
      context: .
      dockerfile: packages/asp-api/Dockerfile
    container_name: asp-api
    depends_on:
      neo4j:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      ASP_API_HOST: "0.0.0.0"
      ASP_API_PORT: "8000"
      ASP_API_ENVIRONMENT: development
      ASP_API_CORS_ORIGINS: "http://localhost:3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: asp-api
      OPA_URL: http://opa:8181
    ports:
      - "8000:8000"

  frontend:
    # Ships as a node:20-alpine dev container in v0.1. Production image TBD.
    image: node:20-alpine
    container_name: asp-frontend
    working_dir: /app
    command: sh -c "npm install --silent && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://asp-api:8000
    ports:
      - "3000:3000"

volumes:
  neo4j-data:
  frontend-node-modules:
