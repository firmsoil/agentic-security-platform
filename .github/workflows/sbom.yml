name: sbom

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  python-sbom:
    name: Python SBOM (CycloneDX)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-packages --no-dev

      - name: Install cyclonedx-py
        run: uv pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: |
          uv run cyclonedx-py environment --output-format JSON --output-file sbom-python.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python-cdx
          path: sbom-python.cdx.json
          retention-days: 90

  container-sbom:
    name: Container SBOM (Syft)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Only run on push to main or on release — building the container on every
    # PR is wasteful and we already have Python-level SBOM coverage above.
    if: github.event_name == 'push' || github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Build asp-api image (local tag only)
        run: docker build -f packages/asp-api/Dockerfile -t asp-api:ci .

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate image SBOM
        run: syft asp-api:ci -o cyclonedx-json=sbom-asp-api.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-asp-api-cdx
          path: sbom-asp-api.cdx.json
          retention-days: 90
