# OpenTelemetry Collector — dev-mode config.
# Receives OTLP (gRPC + HTTP), processes through batch + resource, exports
# to the debug exporter for now. Once asp-adapters.telemetry.ingestor lands,
# we add an OTLP exporter pointing at the ingestor's gRPC endpoint.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

  # Limits memory to keep the dev stack comfortable on a laptop.
  memory_limiter:
    check_interval: 5s
    limit_percentage: 75
    spike_limit_percentage: 20

exporters:
  debug:
    verbosity: basic

  # When the ingestor ships, add:
  # otlp/ingestor:
  #   endpoint: asp-api:4319
  #   tls:
  #     insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
