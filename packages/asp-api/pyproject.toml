[project]
name = "asp-api"
version = "0.1.0"
description = "Agentic Security Platform — FastAPI service"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "asp-core",
    "asp-adapters",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "httpx>=0.27",
    "structlog>=24.4",
    "python-dotenv>=1.0",
]

[project.scripts]
# `asp-api` launches the service.
asp-api = "asp_api.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/asp_api"]

[tool.uv.sources]
asp-core = { workspace = true }
asp-adapters = { workspace = true }
