[project]
name = "asp-cli"
version = "0.1.0"
description = "Agentic Security Platform — developer CLI"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "asp-core",
    "typer>=0.12",
    "rich>=13.8",
    "pyyaml>=6.0",
]

[project.scripts]
asp = "asp_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/asp_cli"]

[tool.uv.sources]
asp-core = { workspace = true }
