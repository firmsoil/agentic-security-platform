[project]
name = "asp-adapters"
version = "0.1.0"
description = "Agentic Security Platform — infrastructure adapters (Neo4j, OTel, LLM, OPA, MCP)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "asp-core",
    "neo4j>=5.25",
    "httpx>=0.27",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp>=1.27",
    "litellm>=1.50",
    "pydantic>=2.9",
    "structlog>=24.4",
]

[project.optional-dependencies]
# Heavy optional deps, installed only when that adapter is used.
mcp = ["mcp>=1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/asp_adapters"]

[tool.uv.sources]
asp-core = { workspace = true }
