[project]
name = "asp-agents"
version = "0.1.0"
description = "Agentic Security Platform — Red / Blue / Green agents (LangGraph + Temporal)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "asp-core",
    "asp-adapters",
    "pydantic>=2.9",
    "structlog>=24.4",
    # langgraph and temporalio ship when the agent implementations land in Phase 2.
    # "langgraph>=0.2",
    # "temporalio>=1.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/asp_agents"]

[tool.uv.sources]
asp-core = { workspace = true }
asp-adapters = { workspace = true }
